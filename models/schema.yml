version: 2

sources:
  - name: raw
    dataset: gz_raw_data
    description: "Main source for raw data hosted on BigQuery."
    tables:
      - name: products
        identifier: raw_gz_product
        description: "Table containing product information."
        columns:
          - name: products_id
            description: "Unique identifier for each product."
            tests:
              - unique
              - not_null
          - name: purchSE_PRICE
            description: "Purchase price of the product."

      - name: sales
        identifier: raw_gz_sales
        description: "Table containing detailed sales transaction records."
        columns:
          - name: date_date
            description: "Date when the transaction occurred."
          - name: orders_id
            description: "Unique identifier for the order."
          - name: pdt_id
            description: "Product identifier (matches products_id)."
          - name: revenue
            description: "Total revenue generated from the sale."
          - name: quantity
            description: "Quantity of products sold."

      - name: ship
        identifier: raw_gz_ship
        description: "Table containing shipping and logistics cost details."
        columns:
          - name: orders_id
            description: "Order identifier (matches sales table)."
            tests:
              - unique
              - not_null
          - name: shipping_fee
            description: "Standard shipping fee."
          - name: logCost
            description: "Logistics operation cost."
          - name: ship_cost
            description: "Total shipping cost."

      # --- Reklam Kanalları (Yeni Eklenenler) ---

      - name: adwords
        identifier: raw_gz_adwords
        description: "Google Ads campaign performance data."
        columns: &ad_columns
          - name: date_date
          - name: paid_source
          - name: campaign_key
          - name: camPGN_name
          - name: ads_cost
          - name: impression
          - name: click

      - name: bing
        identifier: raw_gz_bing
        description: "Bing Ads campaign performance data."
        columns: *ad_columns

      - name: criteo
        identifier: raw_gz_criteo
        description: "Criteo retargeting campaign performance data."
        columns: *ad_columns

      - name: facebook
        identifier: raw_gz_facebook
        description: "Facebook (Meta) Ads campaign performance data."
        columns: *ad_columns