version: 2

sources:
  - name: raw
    dataset: gz_raw_data
    description: "Main source for raw data hosted on BigQuery."
    tables:
      - name: products
        identifier: raw_gz_product
        description: "Table containing product information."
        columns:
          - name: products_id
            description: "Unique identifier for each product."
            tests:
              - unique
              - not_null
          - name: purchSE_PRICE
            description: "Purchase price of the product."

      - name: sales
        identifier: raw_gz_sales
        description: "Table containing detailed sales transaction records."
        columns:
          - name: date_date
            description: "Date when the transaction occurred."
          - name: orders_id
            description: "Unique identifier for the order."
          - name: pdt_id
            description: "Product identifier (matches products_id)."
          - name: revenue
            description: "Total revenue generated from the sale."
          - name: quantity
            description: "Quantity of products sold."

      - name: ship
        identifier: raw_gz_ship
        description: "Table containing shipping and logistics cost details."
        columns:
          - name: orders_id
            description: "Order identifier (matches sales table)."
            tests:
              - unique
              - not_null
          - name: shipping_fee
            description: "Standard shipping fee."
          - name: logCost
            description: "Logistics operation cost."
          - name: ship_cost
            description: "Total shipping cost."

      # --- Reklam Kanalları (Raw Sources) ---
      - name: adwords
        identifier: raw_gz_adwords
        description: "Google Ads campaign performance data."
        columns: &ad_columns
          - name: date_date
          - name: paid_source
          - name: campaign_key
          - name: camPGN_name
          - name: ads_cost
          - name: impression
          - name: click

      - name: bing
        identifier: raw_gz_bing
        description: "Bing Ads campaign performance data."
        columns: *ad_columns

      - name: criteo
        identifier: raw_gz_criteo
        description: "Criteo retargeting campaign performance data."
        columns: *ad_columns

      - name: facebook
        identifier: raw_gz_facebook
        description: "Facebook (Meta) Ads campaign performance data."
        columns: *ad_columns

# --- Oluşturulan Modeller (Models) ---
# DİKKAT: 'models' başlığı 'sources' ile aynı hizada olmalı!
models:
  - name: int_campaigns
    description: "Tüm reklam platformlarından gelen verilerin birleştirildiği ara model."
    columns:
      - name: date_date
        description: "Verinin ait olduğu tarih."
        tests:
          - not_null
      - name: campaign_key
        description: "Kampanyanın benzersiz anahtarı."
        tests:
          - not_null
      - name: campaign_name
        description: "Kampanyanın adı."
      - name: ads_cost
        description: "Reklam harcaması."
        tests:
          - not_null
      - name: impressions
        description: "Görüntülenme sayısı."
        tests:
          - not_null
      - name: clicks
        description: "Tıklanma sayısı."
        tests:
          - not_null
      - name: paid_source
        description: "Kaynak platform."
        tests:
          - not_null
          - accepted_values:
              arguments: # Hata buradaydı, bu satırı ekledik
                values: ['adwords', 'bing', 'criteo', 'facebook']
  - name: int_campaigns_day
    description: "Reklam verilerinin günlük bazda (date_date) ve kampanya bazında (campaign_key) tekilleştirildiği özet tablo."
    columns:
      - name: date_date
        description: "Kaydın ait olduğu gün."
        tests:
          - not_null

      - name: campaign_key
        description: "Kampanyanın benzersiz anahtarı."
        tests:
          - not_null

      - name: campaign_name
        description: "Kampanyanın adı."

      - name: ads_cost
        description: "O güne ait toplam reklam harcaması."
        tests:
          - not_null

      - name: impressions
        description: "O güne ait toplam görüntülenme sayısı."
        tests:
          - not_null

      - name: clicks
        description: "O güne ait toplam tıklanma sayısı."
        tests:
          - not_null

      - name: paid_source
        description: "Reklamın kaynağı."
        tests:
          - not_null
          - accepted_values:
             arguments: # Hata buradaydı, bu satırı ekledik
              values: ['adwords', 'bing', 'criteo', 'facebook']