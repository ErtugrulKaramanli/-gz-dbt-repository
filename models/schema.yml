version: 2

sources:
  - name: raw
    dataset: gz_raw_data
    description: "Main source for raw data hosted on BigQuery."
    tables:
      - name: products
        identifier: raw_gz_product
        description: "Table containing product information."
        columns:
          - name: products_id
            description: "Unique identifier for each product."
            tests:
              - unique
              - not_null
          - name: purchSE_PRICE
            description: "Purchase price of the product."

      - name: sales
        identifier: raw_gz_sales
        description: "Table containing detailed sales transaction records."
        columns:
          - name: date_date
            description: "Date when the transaction occurred."
          - name: orders_id
            description: "Unique identifier for the order."
          - name: pdt_id
            description: "Product identifier (matches products_id)."
          - name: revenue
            description: "Total revenue generated from the sale."
          - name: quantity
            description: "Quantity of products sold."

      - name: ship
        identifier: raw_gz_ship
        description: "Table containing shipping and logistics cost details."
        columns:
          - name: orders_id
            description: "Order identifier (matches sales table)."
            tests:
              - unique
              - not_null
          - name: shipping_fee
            description: "Standard shipping fee."
          - name: logCost
            description: "Logistics operation cost."
          - name: ship_cost
            description: "Total shipping cost."

      # --- Reklam Kanalları (Raw Sources) ---
      - name: adwords
        identifier: raw_gz_adwords
        description: "Google Ads campaign performance data."
        columns: &ad_columns
          - name: date_date
          - name: paid_source
          - name: campaign_key
          - name: camPGN_name
          - name: ads_cost
          - name: impression
          - name: click

      - name: bing
        identifier: raw_gz_bing
        description: "Bing Ads campaign performance data."
        columns: *ad_columns

      - name: criteo
        identifier: raw_gz_criteo
        description: "Criteo retargeting campaign performance data."
        columns: *ad_columns

      - name: facebook
        identifier: raw_gz_facebook
        description: "Facebook (Meta) Ads campaign performance data."
        columns: *ad_columns

# --- Oluşturulan Modeller (Models) ---
models:
  - name: int_campaigns
    description: "Tüm reklam platformlarından gelen verilerin birleştirildiği ara model."
    columns:
      - name: date_date
        tests:
          - not_null
      - name: campaign_key
        tests:
          - not_null
      - name: ads_cost
        tests:
          - not_null
      - name: impression
        tests:
          - not_null
      - name: click
        tests:
          - not_null
      - name: paid_source
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Adwords', 'Bing', 'Criteo', 'Facebook']

  - name: int_campaigns_day
    description: "Reklam verilerinin günlük ve kampanya bazında tekilleştirildiği özet tablo."
    columns:
      - name: date_date
        tests:
          - not_null
      - name: campaign_key
        tests:
          - not_null
      - name: ads_cost
        tests:
          - not_null
      - name: impression
        tests:
          - not_null
      - name: click
        tests:
          - not_null
      - name: paid_source
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Adwords', 'Bing', 'Criteo', 'Facebook']

  - name: finance_campaigns_day
    description: "Finansal veriler ile reklam harcamalarının birleştiği nihai tablo."
    columns:
      - name: date
        description: "Raporun ait olduğu tarih."
        tests:
          - not_null
          - unique
      - name: ads_margin
        tests:
          - not_null
      - name: operational_margin
        tests:
          - not_null
      - name: ads_cost
        tests:
          - not_null
      - name: revenue
        tests:
          - not_null