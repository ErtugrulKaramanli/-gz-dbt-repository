name: 'my_new_project'
version: '1.0.0'
config-version: 2

profile: 'default'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

# Modellerin yapılandırması
models:
  my_new_project:
    # Staging klasörü altındaki modeller 'view' olarak oluşturulur
    staging:
      +materialized: view

    # Intermediate klasörü altındaki modeller 'view' olarak oluşturulur
    intermediate:
      +materialized: view

    # Mart klasörü altındaki modeller (finance_days.sql gibi) 'table' olarak oluşturulur
    mart:
      +materialized: table